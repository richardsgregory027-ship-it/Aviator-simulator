<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aviator - Flight Simulator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e27;
    }

    /* Main Container */
    .container {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
    }

    /* Game Canvas Area */
    .game-area {
      position: relative;
      background: linear-gradient(180deg, #1a1f3a 0%, #2d3561 100%);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Canvas */
    #gameCanvas {
      flex: 1;
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0f1729 0%, #1a2847 100%);
    }

    /* Game Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(0, 0, 0, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      gap: 20px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .status-value {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      font-family: 'Monaco', 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Panel */
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      color: #fff;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 15px;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* Bet Panel */
    .bet-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bet-amount {
      display: flex;
      gap: 10px;
    }

    .bet-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 12px;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
    }

    .bet-input:focus {
      outline: none;
      border-color: rgba(255, 100, 100, 0.5);
      background: rgba(255, 100, 100, 0.05);
    }

    .bet-presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bet-btn {
      background: rgba(255, 100, 100, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.4);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .bet-btn:hover {
      background: rgba(255, 100, 100, 0.4);
      border-color: rgba(255, 100, 100, 0.8);
    }

    /* Action Buttons */
    .button-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Stats Panel */
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #888;
    }

    .stat-value {
      color: #fff;
      font-weight: 600;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    /* History Panel */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-item {
      background: rgba(0, 0, 0, 0.2);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-multiplier {
      color: #4ade80;
      font-weight: 600;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    .history-multiplier.crashed {
      color: #ef4444;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
        gap: 10px;
      }

      .sidebar {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .panel {
        padding: 15px;
      }

      .status-value {
        font-size: 18px;
      }
    }

    /* Scrollbar */
    .history-list::-webkit-scrollbar {
      width: 6px;
    }

    .history-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    .history-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Game Area -->
    <div class="game-area">
      <canvas id="gameCanvas"></canvas>
      <div class="status-bar">
        <div class="status-item">
          <div class="status-label">Multiplier</div>
          <div class="status-value" id="multiplierStatus">0.00×</div>
        </div>
        <div class="status-item">
          <div class="status-label">Round Time</div>
          <div class="status-value" id="roundTime">0.0s</div>
        </div>
        <div class="status-item">
          <div class="status-label">Status</div>
          <div class="status-value" id="roundStatus">Ready</div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Bet Panel -->
      <div class="panel">
        <div class="panel-title">Place Bet</div>
        <div class="bet-section">
          <div>
            <div class="status-label" style="margin-bottom: 8px;">Amount</div>
            <input type="number" id="betAmount" class="bet-input" value="10" min="1" max="10000">
          </div>
          <div>
            <div class="status-label" style="margin-bottom: 8px;">Quick Bets</div>
            <div class="bet-presets">
              <button class="bet-btn" data-amount="5">$5</button>
              <button class="bet-btn" data-amount="10">$10</button>
              <button class="bet-btn" data-amount="25">$25</button>
              <button class="bet-btn" data-amount="50">$50</button>
              <button class="bet-btn" data-amount="100">$100</button>
              <button class="bet-btn" data-amount="250">$250</button>
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" id="betBtn">BET</button>
            <button class="btn btn-secondary" id="cashoutBtn" disabled>CASHOUT</button>
          </div>
        </div>
      </div>

      <!-- Stats Panel -->
      <div class="panel">
        <div class="panel-title">Statistics</div>
        <div>
          <div class="stat-row">
            <span class="stat-label">Balance</span>
            <span class="stat-value" id="balance">$1,000.00</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Wins</span>
            <span class="stat-value" id="wins">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Losses</span>
            <span class="stat-value" id="losses">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Avg Multiplier</span>
            <span class="stat-value" id="avgMultiplier">0.00×</span>
          </div>
        </div>
      </div>

      <!-- History Panel -->
      <div class="panel">
        <div class="panel-title">Recent Rounds</div>
        <div class="history-list" id="historyList">
          <div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">No history yet</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * AVIATOR SIMULATOR - Professional Flight Game
     * Realistic multiplier mechanics and smooth animations
     */

    class AviatorGame {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;

        // Game State
        this.state = {
          phase: 'idle', // idle, betting, flying, crashed, calculating
          multiplier: 1.00,
          flightTime: 0,
          targetMultiplier: 2,
          crashed: false,
          balance: 1000,
          currentBet: 0,
          cashoutMultiplier: 0
        };

        this.stats = {
          wins: 0,
          losses: 0,
          totalRounds: 0,
          history: []
        };

        // Animation State
        this.plane = {
          x: 0,
          y: 0,
          vx: 0,
          vy: 0,
          rotation: 0,
          propellerRotation: 0,
          trail: []
        };

        this.ui = {
          betAmount: 10,
          gameStartTime: 0,
          bettingStartTime: 0
        };

        this.init();
      }

      init() {
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
        
        this.setupEventListeners();
        this.startBettingPhase();
        this.animationLoop();
      }

      resizeCanvas() {
        const rect = this.canvas.getBoundingClientRect();
        this.canvas.style.width = rect.width + 'px';
        this.canvas.style.height = rect.height + 'px';
        this.canvas.width = rect.width * this.dpr;
        this.canvas.height = rect.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
      }

      setupEventListeners() {
        // Bet amount input
        document.getElementById('betAmount').addEventListener('change', (e) => {
          this.ui.betAmount = Math.max(1, Math.min(10000, parseInt(e.target.value) || 10));
          e.target.value = this.ui.betAmount;
        });

        // Quick bet buttons
        document.querySelectorAll('.bet-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const amount = parseInt(e.target.dataset.amount);
            document.getElementById('betAmount').value = amount;
            this.ui.betAmount = amount;
          });
        });

        // Bet button
        document.getElementById('betBtn').addEventListener('click', () => this.placeBet());

        // Cashout button
        document.getElementById('cashoutBtn').addEventListener('click', () => this.cashout());
      }

      startBettingPhase() {
        this.state.phase = 'betting';
        this.ui.bettingStartTime = Date.now();
        this.state.currentBet = 0;
        this.state.crashed = false;
        this.state.multiplier = 1.00;
        this.state.flightTime = 0;
        this.plane.trail = [];
        
        // Generate target multiplier (realistic crash point: 1.5x to 50x)
        this.state.targetMultiplier = this.generateTargetMultiplier();
        
        // Enable bet button
        document.getElementById('betBtn').disabled = false;
        document.getElementById('cashoutBtn').disabled = true;
        document.getElementById('roundStatus').textContent = 'Betting...';
      }

      generateTargetMultiplier() {
        // Weighted distribution favoring smaller multipliers
        const rand = Math.random();
        if (rand < 0.3) return 1 + Math.random() * 0.5; // 1.0-1.5 (30% chance)
        if (rand < 0.6) return 1.5 + Math.random() * 2; // 1.5-3.5 (30% chance)
        if (rand < 0.8) return 3.5 + Math.random() * 5; // 3.5-8.5 (20% chance)
        if (rand < 0.95) return 8.5 + Math.random() * 15; // 8.5-23.5 (15% chance)
        return 23.5 + Math.random() * 26.5; // 23.5-50 (5% chance)
      }

      placeBet() {
        if (this.state.phase !== 'betting') return;
        if (this.ui.betAmount > this.state.balance) {
          alert('Insufficient balance!');
          return;
        }

        this.state.currentBet = this.ui.betAmount;
        this.state.balance -= this.ui.betAmount;
        
        // Start flying after 3 second countdown
        document.getElementById('betBtn').disabled = true;
        
        setTimeout(() => {
          this.startFlying();
        }, 3000);

        this.updateUI();
      }

      startFlying() {
        this.state.phase = 'flying';
        this.state.crashed = false;
        this.state.multiplier = 1.00;
        this.state.flightTime = 0;
        this.ui.gameStartTime = Date.now();
        this.plane.trail = [];

        document.getElementById('cashoutBtn').disabled = false;
        document.getElementById('roundStatus').textContent = 'Flying...';
      }

      cashout() {
        if (this.state.phase !== 'flying' || this.state.crashed) return;

        const winnings = this.state.currentBet * this.state.multiplier;
        this.state.balance += winnings;
        this.state.cashoutMultiplier = this.state.multiplier;

        this.endRound(true);
      }

      endRound(wonRound) {
        this.state.phase = 'calculating';
        document.getElementById('cashoutBtn').disabled = true;

        // Record round
        this.stats.history.unshift({
          multiplier: wonRound ? this.state.cashoutMultiplier : this.state.targetMultiplier,
          won: wonRound
        });

        if (wonRound) {
          this.stats.wins++;
          document.getElementById('roundStatus').textContent = `Won $${(this.state.currentBet * this.state.cashoutMultiplier).toFixed(2)}`;
        } else {
          this.stats.losses++;
          document.getElementById('roundStatus').textContent = 'Crashed!';
        }

        this.stats.totalRounds++;
        this.updateUI();

        // Show history
        this.updateHistory();

        // Start new round after delay
        setTimeout(() => {
          this.startBettingPhase();
        }, 2000);
      }

      updateMultiplier() {
        if (this.state.phase !== 'flying') return;

        const elapsed = Date.now() - this.ui.gameStartTime;
        this.state.flightTime = elapsed / 1000;

        // Exponential growth: slower at start, faster as it increases
        this.state.multiplier = 1 + Math.pow(this.state.flightTime, 1.2) * 0.15;

        // Check if crashed
        if (this.state.multiplier >= this.state.targetMultiplier) {
          this.state.crashed = true;
          this.endRound(false);
        }
      }

      updatePlanePhysics() {
        if (this.state.phase !== 'flying' && this.state.phase !== 'calculating') return;

        const canvasWidth = this.canvas.width / this.dpr;
        const canvasHeight = this.canvas.height / this.dpr;

        // Smooth upward flight path
        const progress = Math.min(this.state.flightTime / 8, 1);
        const curveAmount = Math.sin(progress * Math.PI) * 0.7;

        this.plane.x = canvasWidth * (0.2 + progress * 0.6);
        this.plane.y = canvasHeight * (0.7 - progress * 0.5 - curveAmount * 0.2);

        // Rotation follows flight path
        this.plane.rotation = Math.asin(curveAmount) * 0.5;

        // Propeller spins
        this.plane.propellerRotation += 0.4;

        // Update trail
        this.plane.trail.push({
          x: this.plane.x,
          y: this.plane.y,
          alpha: 1
        });

        if (this.plane.trail.length > 150) {
          this.plane.trail.shift();
        }

        // Fade trail
        this.plane.trail.forEach((point, i) => {
          point.alpha = 1 - (i / this.plane.trail.length);
        });
      }

      drawGame() {
        const canvasWidth = this.canvas.width / this.dpr;
        const canvasHeight = this.canvas.height / this.dpr;

        // Clear canvas with gradient
        const gradient = this.ctx.createLinearGradient(0, 0, 0, canvasHeight);
        gradient.addColorStop(0, '#0f1729');
        gradient.addColorStop(1, '#1a2847');
        this.ctx.fillStyle = gradient;
        this.ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // Draw background elements
        this.drawBackground();

        if (this.state.phase === 'flying' || this.state.phase === 'calculating') {
          this.drawTrail();
          this.drawPlane();
        }

        // Draw UI overlays
        this.drawPhaseIndicator();
      }

      drawBackground() {
        const canvasWidth = this.canvas.width / this.dpr;
        const canvasHeight = this.canvas.height / this.dpr;

        // Grid lines
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        this.ctx.lineWidth = 1;

        for (let i = 0; i < canvasWidth; i += 100) {
          this.ctx.beginPath();
          this.ctx.moveTo(i, 0);
          this.ctx.lineTo(i, canvasHeight);
          this.ctx.stroke();
        }

        for (let i = 0; i < canvasHeight; i += 100) {
          this.ctx.beginPath();
          this.ctx.moveTo(0, i);
          this.ctx.lineTo(canvasWidth, i);
          this.ctx.stroke();
        }
      }

      drawTrail() {
        if (this.plane.trail.length < 2) return;

        this.ctx.strokeStyle = 'rgba(255, 107, 53, 0.6)';
        this.ctx.lineWidth = 3;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';

        this.ctx.beginPath();
        this.ctx.moveTo(this.plane.trail[0].x, this.plane.trail[0].y);

        for (let i = 1; i < this.plane.trail.length; i++) {
          const point = this.plane.trail[i];
          this.ctx.globalAlpha = point.alpha * 0.7;
          this.ctx.lineTo(point.x, point.y);
        }

        this.ctx.stroke();
        this.ctx.globalAlpha = 1;
      }

      drawPlane() {
        const x = this.plane.x;
        const y = this.plane.y;

        this.ctx.save();
        this.ctx.translate(x, y);
        this.ctx.rotate(this.plane.rotation);

        // Shadow
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        this.ctx.beginPath();
        this.ctx.ellipse(0, 15, 25, 8, 0, 0, Math.PI * 2);
        this.ctx.fill();

        // Propeller
        this.drawPropeller();

        // Fuselage
        this.ctx.fillStyle = '#ff6b35';
        this.ctx.shadowColor = 'rgba(255, 107, 53, 0.8)';
        this.ctx.shadowBlur = 20;

        // Body
        this.ctx.beginPath();
        this.ctx.moveTo(-18, -5);
        this.ctx.bezierCurveTo(-22, -5, -24, 0, -20, 5);
        this.ctx.lineTo(8, 6);
        this.ctx.lineTo(18, 3);
        this.ctx.lineTo(20, 0);
        this.ctx.lineTo(18, -3);
        this.ctx.lineTo(8, -6);
        this.ctx.closePath();
        this.ctx.fill();

        // Wings
        this.ctx.fillStyle = '#ff6b35';
        this.ctx.fillRect(-12, -10, 16, 4);
        this.ctx.fillRect(-12, 6, 16, 4);

        // Cockpit
        this.ctx.fillStyle = '#1a1a1a';
        this.ctx.beginPath();
        this.ctx.arc(2, 0, 4, 0, Math.PI * 2);
        this.ctx.fill();

        this.ctx.fillStyle = 'rgba(100, 200, 255, 0.5)';
        this.ctx.beginPath();
        this.ctx.arc(0, -2, 2, 0, Math.PI * 2);
        this.ctx.fill();

        // Tail
        this.ctx.fillStyle = '#ff8c42';
        this.ctx.fillRect(15, -2, 8, 4);

        this.ctx.shadowColor = 'transparent';
        this.ctx.restore();
      }

      drawPropeller() {
        this.ctx.save();
        this.ctx.translate(-15, 0);
        this.ctx.rotate(this.plane.propellerRotation);

        this.ctx.strokeStyle = '#ff8c42';
        this.ctx.lineWidth = 3;

        // Propeller blades
        this.ctx.beginPath();
        this.ctx.moveTo(0, -12);
        this.ctx.lineTo(0, 12);
        this.ctx.stroke();

        this.ctx.beginPath();
        this.ctx.moveTo(-12, 0);
        this.ctx.lineTo(12, 0);
        this.ctx.stroke();

        // Hub
        this.ctx.fillStyle = '#ff6b35';
        this.ctx.beginPath();
        this.ctx.arc(0, 0, 4, 0, Math.PI * 2);
        this.ctx.fill();

        this.ctx.restore();
      }

      drawPhaseIndicator() {
        const canvasWidth = this.canvas.width / this.dpr;
        const canvasHeight = this.canvas.height / this.dpr;

        if (this.state.crashed && this.state.phase === 'calculating') {
          // Crash effect
          this.ctx.fillStyle = 'rgba(255, 50, 50, 0.3)';
          this.ctx.fillRect(0, 0, canvasWidth, canvasHeight);
          
          this.ctx.fillStyle = '#ff3232';
          this.ctx.font = 'bold 48px Arial';
          this.ctx.textAlign = 'center';
          this.ctx.textBaseline = 'middle';
          this.ctx.fillText('CRASHED!', canvasWidth / 2, canvasHeight / 2);
        }
      }

      updateUI() {
        // Multiplier display
        document.getElementById('multiplierStatus').textContent = this.state.multiplier.toFixed(2) + '×';
        
        // Round time
        document.getElementById('roundTime').textContent = this.state.flightTime.toFixed(1) + 's';
        
        // Balance
        document.getElementById('balance').textContent = '$' + this.state.balance.toFixed(2);
        
        // Stats
        document.getElementById('wins').textContent = this.stats.wins;
        document.getElementById('losses').textContent = this.stats.losses;
        
        if (this.stats.totalRounds > 0) {
          const avgMultiplier = this.stats.history.reduce((sum, r) => sum + r.multiplier, 0) / this.stats.totalRounds;
          document.getElementById('avgMultiplier').textContent = avgMultiplier.toFixed(2) + '×';
        }
      }

      updateHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';

        if (this.stats.history.length === 0) {
          historyList.innerHTML = '<div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">No history yet</div>';
          return;
        }

        this.stats.history.slice(0, 10).forEach(round => {
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `
            <span class="history-multiplier ${round.won ? '' : 'crashed'}">
              ${round.multiplier.toFixed(2)}×
            </span>
            <span style="color: ${round.won ? '#4ade80' : '#ef4444'};">
              ${round.won ? '✓' : '✗'}
            </span>
          `;
          historyList.appendChild(item);
        });
      }

      animationLoop() {
        this.updateMultiplier();
        this.updatePlanePhysics();
        this.drawGame();
        this.updateUI();

        requestAnimationFrame(() => this.animationLoop());
      }
    }

    // Start game when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      new AviatorGame();
    });
  </script>
</body>
</html>
