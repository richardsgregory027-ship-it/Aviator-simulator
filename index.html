<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aviator Simulator</title>

<style>
:root {
  --bg: #05060a;
  --panel: #101522;
  --accent: #e11d48;
  --text: #e8e4e0;
}

/* example */
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
}

.canvas-wrap {
  width: 800px;
  margin: 20px auto;
  border: 1px solid #222;
}

canvas {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div class="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
</div>

<script>
const dpr = window.devicePixelRatio || 1;

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext("2d");

cvs.width = 1200 * dpr;
cvs.height = 675 * dpr;

cvs.style.width = '1200px';
cvs.style.height = '675px';

ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

// test draw
ctx.fillStyle = "red";
ctx.fillRect(50, 50, 200, 100);
</script>

</body>
</html>
