<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aviator Simulator</title>
  
  <style>
    :root {
      --bg-dark: #0a0e27;
      --bg-gradient: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      --accent-red: #e11d48;
      --accent-yellow: #fbbf24;
      --accent-green: #10b981;
      --text-light: #e8e4e0;
      --grid-color: rgba(225, 29, 72, 0.1);
      --panel-bg: rgba(26, 31, 58, 0.8);
      --button-green: #10b981;
      --button-hover: #059669;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-light);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-gradient);
    }

    .game-container {
      flex: 1;
      position: relative;
      display: flex;
      gap: 20px;
      padding: 20px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    /* Canvas Section */
    .canvas-section {
      flex: 1;
      position: relative;
      background: var(--panel-bg);
      border: 2px solid var(--accent-red);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(225, 29, 72, 0.3);
    }

    .canvas-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Waiting State Overlay */
    .waiting-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 39, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .waiting-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .waiting-text {
      font-size: 48px;
      font-weight: bold;
      color: var(--accent-red);
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .countdown-bar {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid var(--accent-red);
    }

    .countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow), var(--accent-green));
      width: 100%;
      transition: width 0.1s linear;
    }

    .countdown-text {
      margin-top: 20px;
      font-size: 32px;
      font-weight: bold;
      color: var(--accent-yellow);
      font-family: 'Courier New', monospace;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Notification */
    .notification {
      position: absolute;
      top: 30px;
      left: 30px;
      background: var(--panel-bg);
      border: 2px solid var(--accent-red);
      border-radius: 12px;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 50;
      animation: slideInNotification 0.5s ease-out;
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      color: var(--accent-red);
      font-size: 24px;
      flex-shrink: 0;
    }

    .notification-text {
      font-size: 16px;
      font-weight: bold;
      color: var(--accent-red);
      letter-spacing: 1px;
    }

    @keyframes slideInNotification {
      from {
        transform: translateX(-400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Multiplier Display */
    .multiplier-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
      pointer-events: none;
    }

    .multiplier-value {
      font-size: 120px;
      font-weight: 900;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(225, 29, 72, 0.8);
      letter-spacing: 2px;
      transition: color 0.1s ease, text-shadow 0.1s ease;
    }

    .multiplier-label {
      font-size: 24px;
      color: rgba(232, 228, 224, 0.6);
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Flew Away Indicator */
    .flew-away {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .flew-away.show {
      opacity: 1;
    }

    .flew-away-text {
      font-size: 80px;
      font-weight: 900;
      color: var(--accent-red);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(225, 29, 72, 0.8);
      margin-bottom: 20px;
      animation: zoomIn 0.5s ease-out;
    }

    .flew-away-multiplier {
      font-size: 100px;
      font-weight: 900;
      color: var(--accent-red);
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 30px rgba(225, 29, 72, 0.8);
      letter-spacing: 2px;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* History Panel */
    .history-panel {
      position: absolute;
      bottom: 30px;
      left: 30px;
      background: var(--panel-bg);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 15px 20px;
      z-index: 30;
    }

    .history-title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--accent-red);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .history-items {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 300px;
    }

    .history-item {
      min-width: 50px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease;
      border: 2px solid transparent;
    }

    .history-item:hover {
      transform: scale(1.1);
    }

    .history-item.red {
      background: var(--accent-red);
    }

    .history-item.yellow {
      background: var(--accent-yellow);
      color: #000;
    }

    .history-item.green {
      background: var(--accent-green);
    }

    /* Control Panel */
    .control-panel {
      width: 350px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--panel-bg);
      border: 2px solid var(--accent-red);
      border-radius: 12px;
      padding: 25px;
      height: fit-content;
      box-shadow: 0 0 30px rgba(225, 29, 72, 0.3);
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-label {
      font-size: 14px;
      text-transform: uppercase;
      color: var(--accent-red);
      letter-spacing: 1px;
      font-weight: bold;
    }

    /* Bet Amount Controls */
    .bet-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .bet-button {
      width: 50px;
      height: 50px;
      background: var(--accent-red);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .bet-button:hover {
      background: #c41e3a;
      transform: scale(1.05);
    }

    .bet-button:active {
      transform: scale(0.95);
    }

    .bet-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid var(--accent-red);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-light);
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      font-family: 'Courier New', monospace;
    }

    .bet-input:focus {
      outline: none;
      background: rgba(225, 29, 72, 0.2);
      box-shadow: 0 0 10px rgba(225, 29, 72, 0.5);
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--button-green);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--button-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.5);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: var(--accent-red);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #c41e3a;
      transform: translateY(-2px);
    }

    .btn-secondary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Info Display */
    .info-section {
      background: rgba(225, 29, 72, 0.1);
      border-left: 3px solid var(--accent-red);
      padding: 15px;
      border-radius: 4px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: rgba(232, 228, 224, 0.7);
    }

    .info-value {
      color: var(--accent-yellow);
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    /* Auto Actions Toggles */
    .toggle-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle-option:hover {
      background: rgba(225, 29, 72, 0.2);
    }

    .toggle-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-red);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-checkbox.checked {
      background: var(--accent-red);
    }

    .toggle-checkbox.checked::after {
      content: '✓';
      color: white;
      font-weight: bold;
    }

    .toggle-label {
      flex: 1;
      font-size: 13px;
      color: var(--text-light);
    }

    /* Responsive Design */
    @media (max-width: 1280px) {
      .game-container {
        flex-direction: column;
        gap: 15px;
      }

      .control-panel {
        width: 100%;
        order: 2;
      }

      .canvas-section {
        order: 1;
        min-height: 400px;
      }

      .multiplier-value {
        font-size: 80px;
      }

      .multiplier-label {
        font-size: 18px;
      }

      .flew-away-text {
        font-size: 60px;
      }

      .flew-away-multiplier {
        font-size: 70px;
      }
    }

    @media (max-width: 768px) {
      .game-container {
        padding: 10px;
        gap: 10px;
      }

      .control-panel {
        padding: 15px;
        border-radius: 8px;
      }

      .canvas-section {
        min-height: 300px;
      }

      .multiplier-value {
        font-size: 60px;
      }

      .multiplier-label {
        font-size: 14px;
      }

      .history-panel {
        bottom: 15px;
        left: 15px;
        padding: 10px 15px;
      }

      .notification {
        top: 15px;
        left: 15px;
        padding: 12px 18px;
      }

      .notification-icon {
        width: 35px;
        height: 35px;
        font-size: 20px;
      }

      .notification-text {
        font-size: 14px;
      }

      .btn-primary, .btn-secondary {
        padding: 12px;
        font-size: 14px;
      }
    }

    /* Loading State */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(225, 29, 72, 0.2);
      border-top-color: var(--accent-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <div class="game-wrapper">
    <div class="game-container">
      <!-- Canvas Section -->
      <div class="canvas-section">
        <div class="canvas-wrapper">
          <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Waiting State Overlay -->
        <div class="waiting-overlay" id="waitingOverlay">
          <div class="waiting-text">WAITING...</div>
          <div class="countdown-bar">
            <div class="countdown-fill" id="countdownFill"></div>
          </div>
          <div class="countdown-text" id="countdownText">5</div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification">
          <div class="notification-icon">✈</div>
          <div class="notification-text" id="notificationText">Next Prediction 2.5×</div>
        </div>

        <!-- Multiplier Display -->
        <div class="multiplier-display">
          <div class="multiplier-value" id="multiplierValue">0.00×</div>
          <div class="multiplier-label">Multiplier</div>
        </div>

        <!-- Flew Away Indicator -->
        <div class="flew-away" id="flewAway">
          <div class="flew-away-text">FLEW AWAY</div>
          <div class="flew-away-multiplier" id="flewAwayMultiplier">2.5×</div>
        </div>

        <!-- History Panel -->
        <div class="history-panel">
          <div class="history-title">History</div>
          <div class="history-items" id="historyItems">
            <!-- History items will be added here -->
          </div>
        </div>
      </div>

      <!-- Control Panel -->
      <div class="control-panel">
        <!-- Game Status -->
        <div class="control-section">
          <div class="info-section">
            <div class="info-item">
              <span class="info-label">Status</span>
              <span class="info-value" id="gameStatus">Ready</span>
            </div>
            <div class="info-item">
              <span class="info-label">Balance</span>
              <span class="info-value" id="balanceValue">₹1000.00</span>
            </div>
            <div class="info-item">
              <span class="info-label">Round</span>
              <span class="info-value" id="roundValue">1</span>
            </div>
          </div>
        </div>

        <!-- Bet Amount -->
        <div class="control-section">
          <div class="control-label">Bet Amount</div>
          <div class="bet-controls">
            <button class="bet-button" id="betMinus">−</button>
            <input type="number" class="bet-input" id="betAmount" value="100" min="10" max="5000">
            <button class="bet-button" id="betPlus">+</button>
          </div>
        </div>

        <!-- Auto Actions -->
        <div class="control-section">
          <div class="control-label">Auto Actions</div>
          <div class="toggle-option" id="autoRound">
            <div class="toggle-checkbox"></div>
            <span class="toggle-label">Auto Round</span>
          </div>
          <div class="toggle-option" id="autoCashout">
            <div class="toggle-checkbox"></div>
            <span class="toggle-label">Auto Cashout At</span>
          </div>
          <input type="number" class="bet-input" id="autoCashoutMultiplier" value="2.00" min="1.01" max="100" step="0.01" disabled>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn-primary" id="placeBetBtn">PLACE BET</button>
          <button class="btn-primary" id="cashoutBtn" disabled>CASH OUT</button>
          <button class="btn-secondary" id="resetBtn">RESET</button>
        </div>

        <!-- Additional Info -->
        <div class="control-section">
          <div class="info-section">
            <div class="info-item">
              <span class="info-label">Potential Win</span>
              <span class="info-value" id="potentialWin">₹0.00</span>
            </div>
            <div class="info-item">
              <span class="info-label">FPS</span>
              <span class="info-value" id="fpsValue">60</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Audio Context -->
  <audio id="crashSound" style="display: none;">
    <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
  </audio>

  <script>
    /**
     * AVIATOR SIMULATOR - Professional Game Implementation
     * Features: Realistic flight mechanics, betting system, history tracking, animations
     */

    class AviatorGame {
      constructor() {
        this.canvas = null;
        this.ctx = null;
        this.dpr = window.devicePixelRatio || 1;

        // Game State
        this.gameState = {
          status: 'waiting', // waiting, betting, flying, crashed
          balance: 1000,
          roundNumber: 1,
          currentBet: 100,
          multiplier: 0,
          targetMultiplier: null,
          crashMultiplier: null,
          hasCashedOut: false,
          isBetting: false
        };

        // Game Physics
        this.flight = {
          x: 100,
          y: 500,
          vx: 2,
          vy: 0,
          acceleration: 0.008,
          trailPoints: [],
          maxTrailLength: 200
        };

        // Visual State
        this.visual = {
          fps: 60,
          lastFrameTime: Date.now(),
          frameCount: 0
        };

        // Input State
        this.input = {
          keyboard: {}
        };

        // History
        this.history = [];
        this.maxHistorySize = 10;

        // Timing
        this.countdownDuration = 5000;
        this.countdownStart = null;

        this.init();
      }

      /**
       * Initialize the game
       */
      init() {
        try {
          this.setupCanvas();
          this.setupEventListeners();
          this.generateNextPrediction();
          this.startCountdown();
          this.startRenderLoop();
          console.log('✓ Aviator Game initialized successfully');
          this.hideLoadingScreen();
        } catch (error) {
          console.error('❌ Initialization failed:', error);
          alert('Failed to initialize game: ' + error.message);
        }
      }

      /**
       * Setup canvas
       */
      setupCanvas() {
        this.canvas = document.getElementById('gameCanvas');
        if (!this.canvas) throw new Error('Canvas element not found');

        this.ctx = this.canvas.getContext('2d', { alpha: false, antialias: true });
        if (!this.ctx) throw new Error('Failed to get canvas context');

        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
      }

      /**
       * Resize canvas based on container
       */
      resizeCanvas() {
        const section = document.querySelector('.canvas-section');
        const rect = section.getBoundingClientRect();

        this.canvas.width = rect.width * this.dpr;
        this.canvas.height = rect.height * this.dpr;

        this.canvas.style.width = rect.width + 'px';
        this.canvas.style.height = rect.height + 'px';

        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      }

      /**
       * Setup event listeners
       */
      setupEventListeners() {
        // Bet controls
        document.getElementById('betPlus').addEventListener('click', () => this.adjustBet(50));
        document.getElementById('betMinus').addEventListener('click', () => this.adjustBet(-50));
        document.getElementById('betAmount').addEventListener('change', (e) => {
          this.gameState.currentBet = Math.max(10, Math.min(5000, parseInt(e.target.value) || 100));
          this.updateBetDisplay();
        });

        // Action buttons
        document.getElementById('placeBetBtn').addEventListener('click', () => this.placeBet());
        document.getElementById('cashoutBtn').addEventListener('click', () => this.cashOut());
        document.getElementById('resetBtn').addEventListener('click', () => this.reset());

        // Auto actions
        document.getElementById('autoRound').addEventListener('click', () => this.toggleAutoRound());
        document.getElementById('autoCashout').addEventListener('click', () => this.toggleAutoCashout());
        document.getElementById('autoCashoutMultiplier').addEventListener('change', (e) => {
          // Auto cashout multiplier updated
        });

        // Keyboard
        window.addEventListener('keydown', (e) => this.input.keyboard[e.key] = true);
        window.addEventListener('keyup', (e) => this.input.keyboard[e.key] = false);

        // Touch/Mouse for canvas
        this.canvas.addEventListener('click', () => this.placeBet());
        this.canvas.addEventListener('touchstart', () => this.placeBet());
      }

      /**
       * Adjust bet amount
       */
      adjustBet(amount) {
        this.gameState.currentBet = Math.max(10, Math.min(5000, this.gameState.currentBet + amount));
        this.updateBetDisplay();
      }

      /**
       * Update bet display
       */
      updateBetDisplay() {
        document.getElementById('betAmount').value = this.gameState.currentBet;
        const potential = this.gameState.currentBet * (this.gameState.multiplier || 1);
        document.getElementById('potentialWin').textContent = `₹${potential.toFixed(2)}`;
      }

      /**
       * Toggle auto round
       */
      toggleAutoRound() {
        const toggle = document.getElementById('autoRound');
        toggle.classList.toggle('active');
        toggle.querySelector('.toggle-checkbox').classList.toggle('checked');
      }

      /**
       * Toggle auto cashout
       */
      toggleAutoCashout() {
        const toggle = document.getElementById('autoCashout');
        toggle.classList.toggle('active');
        toggle.querySelector('.toggle-checkbox').classList.toggle('checked');
        document.getElementById('autoCashoutMultiplier').disabled = !toggle.querySelector('.toggle-checkbox').classList.contains('checked');
      }

      /**
       * Generate next prediction
       */
      generateNextPrediction() {
        // Generate random multiplier between 1.1x and 100x with weighted distribution
        const rand = Math.random();
        if (rand < 0.6) {
          this.gameState.targetMultiplier = 1.1 + Math.random() * 2.4; // 1.1x - 3.5x (60% chance)
        } else if (rand < 0.85) {
          this.gameState.targetMultiplier = 3.5 + Math.random() * 6.5; // 3.5x - 10x (25% chance)
        } else {
          this.gameState.targetMultiplier = 10 + Math.random() * 40; // 10x - 50x (15% chance)
        }
        
        this.gameState.targetMultiplier = Math.round(this.gameState.targetMultiplier * 100) / 100;
        this.updateNotification();
      }

      /**
       * Update notification
       */
      updateNotification() {
        const notificationText = document.getElementById('notificationText');
        notificationText.textContent = `Next Prediction ${this.gameState.targetMultiplier.toFixed(2)}×`;
      }

      /**
       * Place bet
       */
      placeBet() {
        if (this.gameState.status !== 'waiting' && this.gameState.status !== 'crashed') return;
        if (this.gameState.balance < this.gameState.currentBet) {
          alert('Insufficient balance');
          return;
        }

        this.gameState.status = 'betting';
        this.gameState.isBetting = true;
        document.getElementById('placeBetBtn').disabled = true;
        document.getElementById('waitingOverlay').classList.add('hidden');

        setTimeout(() => {
          this.startFlight();
        }, 500);
      }

      /**
       * Start flight
       */
      startFlight() {
        this.gameState.status = 'flying';
        this.gameState.hasCashedOut = false;
        this.gameState.multiplier = 1.0;
        this.gameState.crashMultiplier = this.gameState.targetMultiplier;
        this.flight.trailPoints = [];
        this.flight.x = 100;
        this.flight.y = this.canvas.height / this.dpr - 100;
        this.flight.vy = 0;

        document.getElementById('multiplierValue').textContent = '1.00×';
        document.getElementById('gameStatus').textContent = 'Flying';
        document.getElementById('cashoutBtn').disabled = false;

        this.updateBetDisplay();
      }

      /**
       * Cash out
       */
      cashOut() {
        if (this.gameState.status !== 'flying') return;

        this.gameState.hasCashedOut = true;
        const winAmount = this.gameState.currentBet * this.gameState.multiplier;
        this.gameState.balance += winAmount;

        this.addToHistory(this.gameState.multiplier, 'win');

        document.getElementById('balanceValue').textContent = `₹${this.gameState.balance.toFixed(2)}`;
        document.getElementById('gameStatus').textContent = 'Won';
        document.getElementById('cashoutBtn').disabled = true;

        this.endRound();
      }

      /**
       * Handle crash
       */
      handleCrash() {
        this.gameState.status = 'crashed';
        document.getElementById('gameStatus').textContent = 'Crashed';

        // Show flew away indicator
        const flewAway = document.getElementById('flewAway');
        const flewAwayMultiplier = document.getElementById('flewAwayMultiplier');
        flewAwayMultiplier.textContent = `${this.gameState.multiplier.toFixed(2)}×`;
        flewAway.classList.add('show');

        // Play crash sound
        this.playSound();

        this.addToHistory(this.gameState.multiplier, 'crash');

        // Deduct bet from balance
        this.gameState.balance -= this.gameState.currentBet;
        document.getElementById('balanceValue').textContent = `₹${this.gameState.balance.toFixed(2)}`;

        document.getElementById('cashoutBtn').disabled = true;

        setTimeout(() => {
          flewAway.classList.remove('show');
          this.endRound();
        }, 2000);
      }

      /**
       * End round
       */
      endRound() {
        this.gameState.status = 'waiting';
        this.gameState.isBetting = false;
        this.gameState.roundNumber++;

        document.getElementById('roundValue').textContent = this.gameState.roundNumber;
        document.getElementById('gameStatus').textContent = 'Ready';
        document.getElementById('placeBetBtn').disabled = false;
        document.getElementById('multiplierValue').textContent = '0.00×';
        document.getElementById('potentialWin').textContent = '₹0.00';

        this.flight.trailPoints = [];
        this.flight.x = 100;
        this.flight.y = this.canvas.height / this.dpr - 100;

        this.generateNextPrediction();
        this.startCountdown();
      }

      /**
       * Start countdown
       */
      startCountdown() {
        this.countdownStart = Date.now();
        document.getElementById('waitingOverlay').classList.remove('hidden');
      }

      /**
       * Add to history
       */
      addToHistory(multiplier, type) {
        this.history.push({ multiplier, type });
        if (this.history.length > this.maxHistorySize) {
          this.history.shift();
        }
        this.updateHistoryDisplay();
      }

      /**
       * Update history display
       */
      updateHistoryDisplay() {
        const historyItems = document.getElementById('historyItems');
        historyItems.innerHTML = '';

        this.history.forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          
          if (item.type === 'crash') {
            div.classList.add('red');
          } else if (item.multiplier < 3) {
            div.classList.add('yellow');
          } else {
            div.classList.add('green');
          }

          div.textContent = `${item.multiplier.toFixed(1)}×`;
          historyItems.appendChild(div);
        });
      }

      /**
       * Play crash sound
       */
      playSound() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);

          oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.5);

          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
          console.log('Audio not available');
        }
      }

      /**
       * Reset game
       */
      reset() {
        this.gameState.balance = 1000;
        this.gameState.roundNumber = 1;
        this.history = [];
        document.getElementById('balanceValue').textContent = `₹${this.gameState.balance.toFixed(2)}`;
        document.getElementById('roundValue').textContent = this.gameState.roundNumber;
        this.updateHistoryDisplay();
        this.endRound();
      }

      /**
       * Update game physics
       */
      updatePhysics() {
        if (this.gameState.status !== 'flying') return;

        // Update multiplier based on height
        const baseMultiplier = 1.0 + (this.flight.y / 1000);
        this.gameState.multiplier = Math.max(1.0, baseMultiplier);

        // Update velocity and position
        this.flight.vy -= this.flight.acceleration;
        this.flight.y += this.flight.vy;
        this.flight.x += this.flight.vx;

        // Add trail point
        this.flight.trailPoints.push({
          x: this.flight.x,
          y: this.flight.y,
          multiplier: this.gameState.multiplier
        });

        if (this.flight.trailPoints.length > this.flight.maxTrailLength) {
          this.flight.trailPoints.shift();
        }

        // Update multiplier display
        document.getElementById('multiplierValue').textContent = `${this.gameState.multiplier.toFixed(2)}×`;
        this.updateBetDisplay();

        // Check for crash condition
        if (this.gameState.multiplier >= this.gameState.crashMultiplier) {
          this.handleCrash();
        }

        // Auto cashout
        const autoCashoutCheckbox = document.getElementById('autoCashout').querySelector('.toggle-checkbox');
        if (autoCashoutCheckbox.classList.contains('checked')) {
          const autoCashoutValue = parseFloat(document.getElementById('autoCashoutMultiplier').value);
          if (this.gameState.multiplier >= autoCashoutValue) {
            this.cashOut();
          }
        }

        // Keep plane on screen
        if (this.flight.x > this.canvas.width / this.dpr) {
          this.flight.x = this.canvas.width / this.dpr;
        }
      }

      /**
       * Render game
       */
      render() {
        // Clear canvas
        this.ctx.fillStyle = '#0a0e27';
        this.ctx.fillRect(0, 0, this.canvas.width / this.dpr, this.canvas.height / this.dpr);

        // Draw grid
        this.drawGrid();

        // Update countdown if waiting
        if (this.gameState.status === 'waiting') {
          this.updateCountdown();
        }

        // Update physics if flying
        if (this.gameState.status === 'flying') {
          this.updatePhysics();
        }

        // Draw trail
        if (this.flight.trailPoints.length > 1) {
          this.drawTrail();
        }

        // Draw plane
        this.drawPlane();

        // Update FPS
        this.updateFPS();
      }

      /**
       * Draw grid background
       */
      drawGrid() {
        const gridSize = 50;
        this.ctx.strokeStyle = 'rgba(225, 29, 72, 0.08)';
        this.ctx.lineWidth = 1;

        const width = this.canvas.width / this.dpr;
        const height = this.canvas.height / this.dpr;

        for (let x = 0; x < width; x += gridSize) {
          this.ctx.beginPath();
          this.ctx.moveTo(x, 0);
          this.ctx.lineTo(x, height);
          this.ctx.stroke();
        }

        for (let y = 0; y < height; y += gridSize) {
          this.ctx.beginPath();
          this.ctx.moveTo(0, y);
          this.ctx.lineTo(width, y);
          this.ctx.stroke();
        }
      }

      /**
       * Draw flight trail
       */
      drawTrail() {
        if (this.flight.trailPoints.length < 2) return;

        const gradient = this.ctx.createLinearGradient(
          this.flight.trailPoints[0].x,
          this.flight.trailPoints[0].y,
          this.flight.trailPoints[this.flight.trailPoints.length - 1].x,
          this.flight.trailPoints[this.flight.trailPoints.length - 1].y
        );

        gradient.addColorStop(0, 'rgba(225, 29, 72, 0.8)');
        gradient.addColorStop(0.5, 'rgba(251, 191, 36, 0.4)');
        gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

        this.ctx.strokeStyle = gradient;
        this.ctx.lineWidth = 3;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';

        this.ctx.beginPath();
        this.ctx.moveTo(this.flight.trailPoints[0].x, this.flight.trailPoints[0].y);

        for (let i = 1; i < this.flight.trailPoints.length; i++) {
          const point = this.flight.trailPoints[i];
          this.ctx.lineTo(point.x, point.y);
        }

        this.ctx.stroke();
      }

      /**
       * Draw airplane
       */
      drawPlane() {
        const size = 30;
        const x = this.flight.x;
        const y = this.flight.y;

        this.ctx.save();
        this.ctx.translate(x, y);

        // Calculate rotation based on velocity
        const angle = Math.atan2(-this.flight.vy, this.flight.vx);
        this.ctx.rotate(angle);

        // Draw plane body (red)
        this.ctx.fillStyle = '#e11d48';
        
        // Fuselage
        this.ctx.fillRect(-size / 2, -size / 4, size, size / 2);

        // Cockpit
        this.ctx.fillStyle = '#fff';
        this.ctx.beginPath();
        this.ctx.arc(size / 2 - 5, 0, 4, 0, Math.PI * 2);
        this.ctx.fill();

        // Wings
        this.ctx.fillStyle = '#e11d48';
        this.ctx.fillRect(-size / 2, -size / 2, size, size / 4);
        this.ctx.fillRect(-size / 2, size / 4, size, size / 4);

        // Propeller
        this.ctx.strokeStyle = '#e11d48';
        this.ctx.lineWidth = 2;
        this.ctx.beginPath();
        const propAngle = (Date.now() / 30) % (Math.PI * 2);
        const propSize = size / 3;
        this.ctx.moveTo(size / 2, -propSize * Math.sin(propAngle));
        this.ctx.lineTo(size / 2, propSize * Math.sin(propAngle));
        this.ctx.stroke();

        // Glow effect
        this.ctx.shadowColor = 'rgba(225, 29, 72, 0.8)';
        this.ctx.shadowBlur = 15;

        this.ctx.restore();
      }

      /**
       * Update countdown
       */
      updateCountdown() {
        if (!this.countdownStart) return;

        const elapsed = Date.now() - this.countdownStart;
        const remaining = Math.max(0, this.countdownDuration - elapsed);
        const progress = (1 - remaining / this.countdownDuration) * 100;

        document.getElementById('countdownFill').style.width = progress + '%';
        
        const seconds = Math.ceil(remaining / 1000);
        document.getElementById('countdownText').textContent = seconds;

        if (remaining <= 0) {
          this.countdownStart = null;
        }
      }

      /**
       * Update FPS counter
       */
      updateFPS() {
        const now = Date.now();
        const deltaTime = now - this.visual.lastFrameTime;

        this.visual.frameCount++;

        if (deltaTime >= 1000) {
          this.visual.fps = Math.round(this.visual.frameCount * 1000 / deltaTime);
          this.visual.frameCount = 0;
          this.visual.lastFrameTime = now;
          document.getElementById('fpsValue').textContent = this.visual.fps;
        }
      }

      /**
       * Start render loop
       */
      startRenderLoop() {
        const loop = () => {
          this.render();
          requestAnimationFrame(loop);
        };
        loop();
      }

      /**
       * Hide loading screen
       */
      hideLoadingScreen() {
        setTimeout(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
        }, 500);
      }
    }

    // Initialize game when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        window.aviatorGame = new AviatorGame();
      });
    } else {
      window.aviatorGame = new AviatorGame();
    }
  </script>
</body>
