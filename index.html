<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aviator Simulator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    /* Screen Container */
    .screen-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Splash Screen */
    .splash-screen {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      background: #000;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .splash-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Game Screen */
    .game-screen {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }

    .game-screen.active {
      opacity: 1;
      z-index: 100;
    }

    /* Game Content */
    .game-content {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Framed Game Area */
    .frame-container {
      position: relative;
      width: 90%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: none;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-frame {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .game-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Canvas for plane and graph */
    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      display: block;
    }

    /* Multiplier Display */
    .multiplier-display {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 20;
      color: #fff;
      font-size: 48px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Bottom Panel */
    .bottom-panel {
      width: 100%;
      padding: 30px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      border-top: 2px solid #333;
      gap: 40px;
    }

    /* Red Bar (Countdown) */
    .countdown-section {
      flex: 1;
      max-width: 400px;
    }

    .countdown-label {
      color: #999;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .countdown-bar-container {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .countdown-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff4444, #ff8844, #ffcc44);
      width: 100%;
      transition: width 0.05s linear;
    }

    .countdown-text {
      color: #fff;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
    }

    /* User Count Section */
    .user-count-section {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
    }

    .user-avatars {
      display: flex;
      gap: -5px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .user-label {
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-count {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    /* Status Screen */
    .status-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .status-screen.show {
      opacity: 1;
      pointer-events: all;
    }

    .status-screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .frame-container {
        max-width: 95%;
      }

      .multiplier-display {
        font-size: 36px;
        top: 15px;
        left: 15px;
      }

      .bottom-panel {
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }

      .countdown-section,
      .user-count-section {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <div class="screen-container">
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
      <img src="IMG_20260424_154657%20(1).jpg" alt="Splash Screen">
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
      <div class="game-content">
        <!-- Framed Game Area -->
        <div class="frame-container" id="frameContainer">
          <div class="game-frame">
            <img id="gameFrameImage" src="WA_1777110519327.jpeg" alt="Game Frame">
          </div>
          <canvas id="gameCanvas"></canvas>
          
          <!-- Multiplier Display -->
          <div class="multiplier-display" id="multiplierDisplay">0.00×</div>

          <!-- Status Screen Overlay -->
          <div class="status-screen" id="statusScreen">
            <img id="statusImage" src="" alt="Status">
          </div>
        </div>
      </div>

      <!-- Bottom Panel -->
      <div class="bottom-panel">
        <!-- Countdown Section -->
        <div class="countdown-section">
          <div class="countdown-label">Time to Place Bet</div>
          <div class="countdown-bar-container">
            <div class="countdown-bar" id="countdownBar"></div>
          </div>
          <div class="countdown-text" id="countdownText">4.0s</div>
        </div>

        <!-- User Count Section -->
        <div class="user-count-section">
          <div class="user-avatars" id="userAvatars">
            <div class="avatar" id="avatar1">🦁</div>
            <div class="avatar" id="avatar2">🐯</div>
            <div class="avatar" id="avatar3">🦊</div>
          </div>
          <div class="user-info">
            <div class="user-label">Players In</div>
            <div class="user-count" id="userCount">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * AVIATOR SIMULATOR - Custom Visual Implementation
     */

    class AviatorSimulator {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;
        this.frameContainer = document.getElementById('frameContainer');

        this.gameState = {
          phase: 'splash', // splash, countdown, flying, crashed, final
          multiplier: 0,
          targetMultiplier: null,
          crashed: false,
          startTime: null,
          countdownStartTime: null
        };

        this.animation = {
          planeX: 0,
          planeY: 0,
          trailPoints: [],
          maxTrailLength: 100
        };

        this.ui = {
          userCount: 0,
          countdownRemaining: 4,
          barProgress: 100
        };

        this.animals = ['🦁', '🐯', '🦊', '🐻', '🐼', '🦌', '🦓', '🦒'];
        this.currentAnimalIndex = 0;
        this.animalUpdateInterval = null;

        this.init();
      }

      init() {
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());

        // Splash screen click to start
        document.getElementById('splashScreen').addEventListener('click', () => this.startGame());

        // Start animation loop
        this.animationLoop();
      }

      resizeCanvas() {
        const rect = this.frameContainer.getBoundingClientRect();

        // Set canvas display size
        this.canvas.style.width = rect.width + 'px';
        this.canvas.style.height = rect.height + 'px';

        // Set canvas drawing surface size
        this.canvas.width = rect.width * this.dpr;
        this.canvas.height = rect.height * this.dpr;

        // Scale the context to match device pixel ratio
        this.ctx.scale(this.dpr, this.dpr);
      }

      startGame() {
        this.gameState.phase = 'countdown';
        document.getElementById('splashScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('active');

        this.gameState.countdownStartTime = Date.now();
        this.gameState.targetMultiplier = 2 + Math.random() * 5; // 2x to 7x

        // Start countdown timer (4 seconds)
        this.startCountdown();

        // Start animal rotation
        this.startAnimalRotation();

        // Start user count increase
        this.startUserCountIncrease();

        // Start flying phase after 4 seconds
        setTimeout(() => {
          this.gameState.phase = 'flying';
          this.gameState.startTime = Date.now();
          this.animation.trailPoints = []; // Reset trail
        }, 4000);

        // Crash after random duration
        const crashDelay = 4000 + 3000 + Math.random() * 5000; // After countdown + 3-8 seconds
        setTimeout(() => {
          if (!this.gameState.crashed) {
            this.gameState.crashed = true;
            this.gameState.phase = 'crashed';
            this.showStatusScreen('IMG_20260424_154837~2.jpg');
            clearInterval(this.animalUpdateInterval);

            // Show final screen after 3 seconds
            setTimeout(() => {
              this.gameState.phase = 'final';
              document.getElementById('statusImage').src = 'IMG_20260424_154744~2.jpg';
            }, 3000);
          }
        }, crashDelay);
      }

      startCountdown() {
        const interval = setInterval(() => {
          const elapsed = (Date.now() - this.gameState.countdownStartTime) / 1000;
          const remaining = Math.max(0, 4 - elapsed);

          this.ui.countdownRemaining = remaining;
          this.ui.barProgress = (remaining / 4) * 100;

          document.getElementById('countdownText').textContent = remaining.toFixed(1) + 's';
          document.getElementById('countdownBar').style.width = this.ui.barProgress + '%';

          if (remaining <= 0) {
            clearInterval(interval);
          }
        }, 50);
      }

      startAnimalRotation() {
        this.animalUpdateInterval = setInterval(() => {
          if (this.gameState.phase === 'countdown' || this.gameState.phase === 'flying') {
            this.currentAnimalIndex = (this.currentAnimalIndex + 1) % this.animals.length;
            document.getElementById('avatar1').textContent = this.animals[this.currentAnimalIndex];
            document.getElementById('avatar2').textContent = this.animals[(this.currentAnimalIndex + 2) % this.animals.length];
            document.getElementById('avatar3').textContent = this.animals[(this.currentAnimalIndex + 4) % this.animals.length];
          }
        }, 30);
      }

      startUserCountIncrease() {
        const startCount = this.ui.userCount;
        const targetCount = 50 + Math.random() * 150; // 50-200 users
        const startTime = Date.now();
        const duration = 4000; // 4 seconds

        const interval = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);

          if (this.gameState.phase === 'countdown') {
            this.ui.userCount = Math.floor(startCount + (targetCount - startCount) * progress);
            document.getElementById('userCount').textContent = this.ui.userCount;
          }

          if (progress >= 1) {
            clearInterval(interval);
          }
        }, 100);
      }

      showStatusScreen(imagePath) {
        const statusScreen = document.getElementById('statusScreen');
        document.getElementById('statusImage').src = imagePath;
        statusScreen.classList.add('show');
      }

      updateMultiplier() {
        if (this.gameState.phase === 'flying' && !this.gameState.crashed) {
          const elapsed = Date.now() - this.gameState.startTime;
          const seconds = elapsed / 1000;

          // Multiplier increases continuously with time
          this.gameState.multiplier = 1 + seconds * 0.8; // Increases faster for visible effect

          // Crash if reached target multiplier
          if (this.gameState.multiplier >= this.gameState.targetMultiplier) {
            this.gameState.crashed = true;
            this.gameState.phase = 'crashed';
            this.showStatusScreen('IMG_20260424_154837~2.jpg');

            setTimeout(() => {
              this.gameState.phase = 'final';
              document.getElementById('statusImage').src = 'IMG_20260424_154744~2.jpg';
            }, 3000);
          }
        }

        document.getElementById('multiplierDisplay').textContent = this.gameState.multiplier.toFixed(2) + '×';
      }

      updatePlaneAnimation() {
        if (this.gameState.phase === 'flying' && !this.gameState.crashed) {
          const elapsed = Date.now() - this.gameState.startTime;
          const cycleTime = 3000; // 3 second full cycle (1.5s up, 1.5s down)
          const cyclePosition = (elapsed % cycleTime) / cycleTime;

          // Get canvas dimensions in logical pixels
          const canvasWidth = this.canvas.width / this.dpr;
          const canvasHeight = this.canvas.height / this.dpr;

          // Define movement bounds (stay within frame)
          const topBound = canvasHeight * 0.15; // 15% from top
          const bottomBound = canvasHeight * 0.85; // 85% from top (15% from bottom)

          // Smooth sine wave motion
          const sineWave = Math.sin(cyclePosition * Math.PI * 2 - Math.PI / 2);
          
          // Map sine wave (-1 to 1) to height bounds
          this.animation.planeY = ((bottomBound + topBound) / 2) + (sineWave * (bottomBound - topBound) / 2);
          this.animation.planeX = canvasWidth * 0.25; // Keep plane at 25% from left
        }
      }

      drawGame() {
        // Get logical dimensions
        const logicalWidth = this.canvas.width / this.dpr;
        const logicalHeight = this.canvas.height / this.dpr;

        // Clear canvas
        this.ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        if (this.gameState.phase === 'flying' || this.gameState.phase === 'crashed') {
          // Draw trail (graph line)
          this.drawTrail();

          // Draw plane
          this.drawPlane();
        }
      }

      drawTrail() {
        // Add current position to trail
        this.animation.trailPoints.push({
          x: this.animation.planeX,
          y: this.animation.planeY
        });

        // Keep trail length manageable
        if (this.animation.trailPoints.length > this.animation.maxTrailLength) {
          this.animation.trailPoints.shift();
        }

        // Draw line
        if (this.animation.trailPoints.length > 1) {
          this.ctx.beginPath();
          this.ctx.moveTo(this.animation.trailPoints[0].x, this.animation.trailPoints[0].y);

          for (let i = 1; i < this.animation.trailPoints.length; i++) {
            this.ctx.lineTo(this.animation.trailPoints[i].x, this.animation.trailPoints[i].y);
          }

          this.ctx.strokeStyle = 'rgba(255, 80, 80, 0.8)';
          this.ctx.lineWidth = 3;
          this.ctx.lineCap = 'round';
          this.ctx.lineJoin = 'round';
          this.ctx.stroke();
        }
      }

      drawPlane() {
        const x = this.animation.planeX;
        const y = this.animation.planeY;
        const size = 20;

        // Draw plane body (triangle pointing up)
        this.ctx.fillStyle = '#ffffff';
        this.ctx.beginPath();
        this.ctx.moveTo(x, y - size); // Top point
        this.ctx.lineTo(x + size, y + size); // Bottom right
        this.ctx.lineTo(x - size, y + size); // Bottom left
        this.ctx.closePath();
        this.ctx.fill();

        // Draw plane outline
        this.ctx.strokeStyle = '#ff6464';
        this.ctx.lineWidth = 2;
        this.ctx.stroke();

        // Draw cockpit
        this.ctx.fillStyle = '#ff6464';
        this.ctx.beginPath();
        this.ctx.arc(x, y - size / 2, 5, 0, Math.PI * 2);
        this.ctx.fill();
      }

      animationLoop() {
        this.updateMultiplier();
        this.updatePlaneAnimation();
        this.drawGame();

        requestAnimationFrame(() => this.animationLoop());
      }
    }

    // Initialize game when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      new AviatorSimulator();
    });
  </script>
</body>
</html>
